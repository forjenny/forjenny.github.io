<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>how we got here 🩷</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600&family=Pacifico&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --pink: #f472b6;
    --pink-light: #fce7f3;
    --pink-mid: #fbcfe8;
    --pink-dark: #db2777;
    --pink-deep: #9d174d;
    --cream: #fff9fb;
    --text: #4a1942;
    --text-soft: #9d4a7c;
    --shadow: rgba(244, 114, 182, 0.25);
  }

  html, body {
    height: 100%;
    background: var(--cream);
    font-family: 'Nunito', sans-serif;
    color: var(--text);
    overflow-x: hidden;
  }

  /* ── decorative bg dots ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, #f9a8d4 1px, transparent 1px);
    background-size: 28px 28px;
    opacity: 0.35;
    pointer-events: none;
    z-index: 0;
  }

  /* ── header ── */
  header {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 3rem 1rem 1.5rem;
  }

  header h1 {
    font-family: 'Pacifico', cursive;
    font-size: clamp(2rem, 6vw, 3.5rem);
    color: var(--pink-dark);
    text-shadow: 3px 3px 0 #fbcfe8, 5px 5px 0 rgba(219,39,119,0.15);
    letter-spacing: 1px;
  }

  header p {
    margin-top: 0.5rem;
    font-size: 1rem;
    color: var(--text-soft);
    font-style: italic;
    font-weight: 600;
  }

  .hearts-row {
    margin-top: 0.75rem;
    font-size: 1.3rem;
    letter-spacing: 6px;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
  }

  /* ── flipbook wrapper ── */
  .flipbook-wrap {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    padding: 2rem 1rem 1rem;
    min-height: 520px;
  }

  /* ── nav arrows ── */
  .nav-btn {
    background: white;
    border: 2.5px solid var(--pink);
    color: var(--pink-dark);
    font-size: 1.6rem;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    cursor: pointer;
    flex-shrink: 0;
    box-shadow: 3px 3px 0 var(--pink-mid);
    transition: transform 0.15s, box-shadow 0.15s;
    display: flex; align-items: center; justify-content: center;
    z-index: 20;
    user-select: none;
  }
  .nav-btn:hover { transform: scale(1.08); box-shadow: 4px 4px 0 var(--pink); }
  .nav-btn:active { transform: scale(0.96); box-shadow: 1px 1px 0 var(--pink); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; transform: none; }

  /* ── book ── */
  .book {
    position: relative;
    width: min(400px, 88vw);
    flex-shrink: 0;
    margin: 0 1rem;
  }

  /* spine shadow on left */
  .book::before {
    content: '';
    position: absolute;
    left: 10px;
    top: 12px;
    bottom: -8px;
    width: 100%;
    background: #f9a8d4;
    border-radius: 18px;
    z-index: 0;
  }

  .book::after {
    content: '';
    position: absolute;
    left: 5px;
    top: 6px;
    bottom: -4px;
    width: 100%;
    background: #fbcfe8;
    border-radius: 18px;
    z-index: 0;
  }

  /* ── page card ── */
  .page-card {
    position: relative;
    z-index: 2;
    background: white;
    border-radius: 18px;
    border: 2.5px solid var(--pink-mid);
    box-shadow: 0 8px 32px var(--shadow);
    padding: 1.5rem 1.5rem 1.25rem;
    min-height: 460px;
    display: flex;
    flex-direction: column;
    animation: pageFlip 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    transform-origin: left center;
  }

  @keyframes pageFlip {
    0% { opacity: 0; transform: rotateY(-8deg) translateX(10px); }
    100% { opacity: 1; transform: rotateY(0deg) translateX(0); }
  }

  .page-card.flip-back {
    animation: pageFlipBack 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  @keyframes pageFlipBack {
    0% { opacity: 0; transform: rotateY(8deg) translateX(-10px); }
    100% { opacity: 1; transform: rotateY(0deg) translateX(0); }
  }

  /* ── ribbon tab ── */
  .ribbon {
    position: absolute;
    top: -2px;
    right: 28px;
    background: var(--pink);
    color: white;
    font-size: 0.7rem;
    font-weight: 800;
    letter-spacing: 1px;
    padding: 4px 14px 8px;
    clip-path: polygon(0 0, 100% 0, 100% 80%, 50% 100%, 0 80%);
    text-transform: uppercase;
  }

  /* ── page number corner ── */
  .page-num {
    position: absolute;
    bottom: 16px;
    right: 20px;
    font-size: 0.75rem;
    color: var(--text-soft);
    font-weight: 700;
    opacity: 0.6;
  }

  /* ── image area ── */
  .img-frame {
    position: relative;
    width: 100%;
    aspect-ratio: 4/3;
    border-radius: 12px;
    overflow: hidden;
    border: 2.5px dashed var(--pink-mid);
    background: var(--pink-light);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 8px;
  }

  .img-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 10px;
    display: block;
  }

  .img-placeholder-icon {
    font-size: 2.5rem;
    opacity: 0.4;
  }

  .img-placeholder-text {
    font-size: 0.8rem;
    color: var(--text-soft);
    font-weight: 700;
    opacity: 0.6;
    text-align: center;
  }

  /* washi tape accent */
  .tape {
    position: absolute;
    top: -10px;
    left: 50%;
    transform: translateX(-50%) rotate(-2deg);
    width: 60px;
    height: 22px;
    background: rgba(244, 114, 182, 0.35);
    border-radius: 3px;
    z-index: 3;
  }

  /* ── caption area ── */
  .caption-wrap {
    margin-top: 1rem;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .caption-label {
    font-size: 0.65rem;
    font-weight: 800;
    color: var(--pink);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .caption-text {
    font-family: 'Nunito', sans-serif;
    font-size: 0.95rem;
    font-style: italic;
    font-weight: 600;
    color: var(--text);
    text-align: center;
    line-height: 1.5;
    background: var(--pink-light);
    border-radius: 12px;
    padding: 0.6rem 1rem;
    width: 100%;
    border-left: 3px solid var(--pink);
  }

  /* ── progress dots ── */
  .dots-row {
    position: relative;
    z-index: 10;
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 1rem 0 0.5rem;
    flex-wrap: wrap;
  }

  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    border: 2px solid var(--pink);
    background: transparent;
    cursor: pointer;
    transition: background 0.2s, transform 0.2s;
    flex-shrink: 0;
  }

  .dot.active {
    background: var(--pink-dark);
    border-color: var(--pink-dark);
    transform: scale(1.3);
  }

  .dot:hover { background: var(--pink-mid); }

  /* ── bottom counter ── */
  .counter {
    position: relative;
    z-index: 10;
    text-align: center;
    font-size: 0.8rem;
    color: var(--text-soft);
    font-weight: 700;
    padding-bottom: 3rem;
  }

  /* ── sticker decorations ── */
  .sticker {
    position: fixed;
    font-size: 1.8rem;
    opacity: 0.5;
    pointer-events: none;
    animation: wobble 4s ease-in-out infinite;
    z-index: 1;
  }

  @keyframes wobble {
    0%, 100% { transform: rotate(-8deg); }
    50% { transform: rotate(8deg); }
  }

  .s1 { top: 8%; left: 4%; animation-delay: 0s; }
  .s2 { top: 20%; right: 3%; animation-delay: 0.8s; }
  .s3 { bottom: 25%; left: 3%; animation-delay: 1.6s; }
  .s4 { bottom: 15%; right: 4%; animation-delay: 2.4s; }
  .s5 { top: 55%; left: 2%; animation-delay: 1.2s; }
  .s6 { top: 42%; right: 2%; animation-delay: 3.2s; }

  /* ── keyboard hint ── */
  .key-hint {
    position: relative;
    z-index: 10;
    text-align: center;
    font-size: 0.72rem;
    color: var(--text-soft);
    opacity: 0.6;
    padding-bottom: 0.5rem;
  }

  #confetti-canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 999;
  }

  @media (max-width: 500px) {
    .sticker { display: none; }
    .nav-btn { width: 40px; height: 40px; font-size: 1.2rem; }
    .book { margin: 0 0.5rem; }
  }
</style>
</head>
<body>

<!-- decorative stickers -->
<div class="sticker s1">🌸</div>
<div class="sticker s2">✨</div>
<div class="sticker s3">🩷</div>
<div class="sticker s4">🌷</div>
<div class="sticker s5">⭐</div>
<div class="sticker s6">🎀</div>

<header>
  <h1>how we got here</h1>
  <p>a little story, just for you</p>
  <div class="hearts-row">🩷 🩷 🩷</div>
</header>

<div class="flipbook-wrap">
  <button class="nav-btn" id="prevBtn" onclick="changePage(-1)" disabled>‹</button>

  <div class="book">
    <div class="page-card" id="pageCard">
      <div class="ribbon" id="ribbonLabel">cover</div>
      <div class="tape"></div>

      <div class="img-frame" id="imgFrame">
        <!-- Replace the placeholder below with: <img src="your-image.jpg" alt="description"> -->
        <div class="img-placeholder-icon">🎨</div>
        <div class="img-placeholder-text">your drawing goes here</div>
      </div>

      <div class="caption-wrap">
        <div class="caption-label">✦ caption ✦</div>
        <div class="caption-text" id="captionText">how we got here</div>
      </div>

      <div class="page-num" id="pageNum">✦</div>
    </div>
  </div>

  <button class="nav-btn" id="nextBtn" onclick="changePage(1)">›</button>
</div>

<div class="dots-row" id="dotsRow"></div>
<div class="counter" id="counter">cover · 21 pages</div>
<div class="key-hint">use ← → arrow keys to flip pages</div>

<script>
const pages = [
  {
    label: "cover",
    image: null,
    caption: "how we got here",
    isSpecial: true
  },
  {
    label: "page 1",
    image: null,
    caption: "wait."
  },
  {
    label: "page 2",
    image: null,
    caption: "I'll just say hi real quick... ...this is 400 words"
  },
  {
    label: "page 3",
    image: null,
    caption: "loneliness isn't just being alone. it's wanting to be known."
  },
  {
    label: "page 4",
    image: null,
    caption: "alr sent a friend request :p"
  },
  {
    label: "page 5",
    image: null,
    caption: "...noted. 🩷"
  },
  {
    label: "page 6",
    image: null,
    caption: "april 30th. got it."
  },
  {
    label: "page 7",
    image: null,
    caption: "I already knew. I just liked hearing her talk."
  },
  {
    label: "page 8",
    image: null,
    caption: "she hates texting. she kept texting."
  },
  {
    label: "page 9",
    image: null,
    caption: "we stopped keeping track of the time."
  },
  {
    label: "page 10",
    image: null,
    caption: "sorry. can we go back to being silly and dumb?"
  },
  {
    label: "page 11",
    image: null,
    caption: "she was nervous. I was nervous. neither of us said anything."
  },
  {
    label: "finale",
    image: null,
    caption: "I don't say it enough, but having you in my life genuinely means so much to me. You've made things brighter just by being you, and I'm really grateful our paths crossed.\n\nHappy birthday, Jenny. 🎂\n— your american social experiment",
    isSpecial: true
  }
];

let current = 0;
let direction = 1;

const pageCard = document.getElementById('pageCard');
const ribbonLabel = document.getElementById('ribbonLabel');
const imgFrame = document.getElementById('imgFrame');
const captionText = document.getElementById('captionText');
const pageNum = document.getElementById('pageNum');
const counter = document.getElementById('counter');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const dotsRow = document.getElementById('dotsRow');

function buildDots() {
  dotsRow.innerHTML = '';
  pages.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === current ? ' active' : '');
    d.onclick = () => jumpTo(i);
    dotsRow.appendChild(d);
  });
}

function jumpTo(i) {
  direction = i >= current ? 1 : -1;
  current = i;
  render();
}

function render(anim) {
  const p = pages[current];

  pageCard.className = 'page-card' + (anim === 'back' ? ' flip-back' : '');
  void pageCard.offsetWidth;

  ribbonLabel.textContent = p.label;

  if (p.image) {
    imgFrame.innerHTML = `<div class="tape"></div><img src="${p.image}" alt="${p.label}">`;
  } else {
    const icon = p.isSpecial ? (current === 0 ? '🌸' : '🎂') : '🎨';
    imgFrame.innerHTML = `
      <div class="img-placeholder-icon">${icon}</div>
      <div class="img-placeholder-text">your drawing goes here</div>`;
  }

  captionText.innerHTML = p.caption.replace(/\n/g, '<br>');

  if (current === 0) {
    pageNum.textContent = '✦';
  } else if (current === pages.length - 1) {
    pageNum.textContent = '🩷';
  } else {
    pageNum.textContent = `${current} / ${pages.length - 2}`;
  }

  counter.textContent = current === 0
    ? `cover · ${pages.length - 2} pages`
    : current === pages.length - 1
    ? `the end 🩷`
    : `page ${current} of ${pages.length - 2}`;

  prevBtn.disabled = current === 0;
  nextBtn.disabled = current === pages.length - 1;

  if (current === pages.length - 1) setTimeout(spawnConfetti, 300);

  buildDots();
}

function changePage(dir) {
  const next = current + dir;
  if (next < 0 || next >= pages.length) return;
  current = next;
  render(dir < 0 ? 'back' : '');
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') changePage(1);
  if (e.key === 'ArrowLeft') changePage(-1);
});

// ── confetti ──
const canvas = document.createElement('canvas');
canvas.id = 'confetti-canvas';
document.body.appendChild(canvas);
const ctx = canvas.getContext('2d');
let particles = [];
let animId = null;

const COLORS = ['#f472b6','#fb7185','#fbbf24','#a78bfa','#34d399','#60a5fa','#f9a8d4','#fde68a'];
const SHAPES = ['circle','square','heart'];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function spawnConfetti() {
  particles = [];
  for (let i = 0; i < 160; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: -10 - Math.random() * 200,
      size: 6 + Math.random() * 8,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      shape: SHAPES[Math.floor(Math.random() * SHAPES.length)],
      vx: (Math.random() - 0.5) * 3,
      vy: 2 + Math.random() * 4,
      rot: Math.random() * Math.PI * 2,
      rotV: (Math.random() - 0.5) * 0.15,
      alpha: 1,
      life: 180 + Math.floor(Math.random() * 80)
    });
  }
  if (animId) cancelAnimationFrame(animId);
  animateConfetti();
}

function drawHeart(cx, cy, size, rot) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rot);
  ctx.beginPath();
  const s = size * 0.5;
  ctx.moveTo(0, s * 0.6);
  ctx.bezierCurveTo(-s, -s * 0.2, -s * 1.6, s * 0.8, 0, s * 1.6);
  ctx.bezierCurveTo(s * 1.6, s * 0.8, s, -s * 0.2, 0, s * 0.6);
  ctx.fill();
  ctx.restore();
}

function animateConfetti() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  let alive = false;
  for (const p of particles) {
    if (p.life <= 0) continue;
    alive = true;
    p.x += p.vx;
    p.y += p.vy;
    p.rot += p.rotV;
    p.vy += 0.04;
    p.life--;
    p.alpha = Math.min(1, p.life / 40);
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    if (p.shape === 'circle') {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size / 2, 0, Math.PI * 2);
      ctx.fill();
    } else if (p.shape === 'square') {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
      ctx.restore();
    } else {
      drawHeart(p.x, p.y, p.size, p.rot);
    }
  }
  ctx.globalAlpha = 1;
  if (alive) animId = requestAnimationFrame(animateConfetti);
  else ctx.clearRect(0, 0, canvas.width, canvas.height);
}

render();
</script>
</body>
</html>
